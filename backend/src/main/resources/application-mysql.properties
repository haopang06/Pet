# 本地 MySQL 持久化配置
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/pet_feeding_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 使用 update 可以保留已有数据，只在实体变化时补充表结构
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.h2.console.enabled=false

spring.security.user.name=admin
spring.security.user.password=admin

jwt.secret=petfeedingsecretkey
jwt.expiration=86400000
